<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-gutter bg-radial-gradient relative overflow-hidden">
<!-- Subtle background elements for depth -->
<div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center opacity-20">
<div class="w-[800px] h-[800px] rounded-full bg-primary-container blur-[120px]"></div>
</div>
<!-- Login Card Container -->
<main class="w-full max-w-[420px] bg-surface/90 backdrop-blur-md border border-outline-variant rounded-xl p-stack-lg shadow-2xl relative z-10 flex flex-col items-center">
<!-- Logo -->
<div class="mb-stack-md relative">
<div class="absolute inset-0 rounded-full bg-secondary-fixed opacity-20 blur-xl"></div>
<img alt="Capital SK Logo" class="w-28 h-28 md:w-32 md:h-32 rounded-full object-cover border-2 border-outline-variant relative z-10 shadow-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB32-kmlnwBBQsvvtn9AfngHRg0mW0dXhAUQalbBnHDMxCcLKBSl4i-5xT224zyAZU2gmhKReMabKDnCDT-X5oANomINKC44vRJ8NIJh56KEz8gB3pywXNHlSs1IXzoz1UnAHMqTqE8yxlm20vVmAq5Xv__PvS5PRXMfIt7yXT9OlWZ3sHVNsFLUsu9AbPSLTsgP-WCC5_yn1PvTzBG6LItRplfAdwIkF2Ht0gDoZqaVf9x9IoYmm7Q-C5vr1DN5YTH"/>
</div>
<!-- Typography Header -->
<header class="text-center w-full mb-stack-lg">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight mb-stack-xs uppercase">Gestión Capital SK</h1>
<p class="font-body-base text-body-base text-secondary font-semibold uppercase tracking-wider text-sm">Escuela de Patinaje</p>
</header>
<!-- Login Form -->
<form class="w-full flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-stack-xs">
<label class="font-title-md text-title-md text-on-surface-variant text-sm" for="email">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-[#020617] border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface font-body-base text-body-base placeholder:text-outline focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-all" id="email" placeholder="atleta@capitalsk.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-stack-xs mb-stack-xs">
<label class="font-title-md text-title-md text-on-surface-variant text-sm flex justify-between" for="password">
                    Contraseña
                    <a class="text-tertiary hover:text-tertiary-fixed transition-colors font-body-sm text-body-sm" href="#">¿Olvidaste?</a>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-[#020617] border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface font-body-base text-body-base placeholder:text-outline focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-all" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary-fixed hover:bg-secondary text-on-secondary-fixed font-title-md text-title-md py-3 rounded-lg flex items-center justify-center gap-2 transition-transform active:scale-[0.98] mt-stack-sm shadow-[0_0_15px_rgba(255,226,76,0.15)] hover:shadow-[0_0_20px_rgba(255,226,76,0.3)] border border-transparent" type="submit">
                Iniciar Sesión
                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">login</span>
</button>
</form>
</main>
<!-- Footer -->
<footer class="mt-stack-lg relative z-10 text-center">
<p class="font-data-mono text-data-mono text-outline uppercase tracking-widest opacity-50 flex items-center gap-2 justify-center">
<span class="material-symbols-outlined text-[16px]">database</span>
            Prototipo para Sistema de Bases de Datos
        </p>
</footer>
